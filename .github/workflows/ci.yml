name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-skills:
    name: Validate Claude Code Skills
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check skill structure
        run: |
          echo "Checking .claude/skills/ directory structure..."
          errors=0

          for skill_dir in .claude/skills/*/; do
            skill_name=$(basename "$skill_dir")
            echo "--- Validating skill: $skill_name ---"

            # Every skill must have a SKILL.md
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "ERROR: $skill_dir is missing SKILL.md"
              errors=$((errors + 1))
              continue
            fi

            # SKILL.md must have YAML frontmatter (starts with ---)
            if ! head -1 "$skill_dir/SKILL.md" | grep -q '^---'; then
              echo "ERROR: $skill_dir/SKILL.md missing YAML frontmatter"
              errors=$((errors + 1))
            else
              echo "  SKILL.md: frontmatter OK"
            fi

            # Check name field exists in frontmatter
            if grep -q '^name:' "$skill_dir/SKILL.md"; then
              echo "  SKILL.md: name field OK"
            else
              echo "WARNING: $skill_dir/SKILL.md missing 'name' field in frontmatter"
            fi

            # Check description field exists in frontmatter
            if grep -q '^description:' "$skill_dir/SKILL.md"; then
              echo "  SKILL.md: description field OK"
            else
              echo "WARNING: $skill_dir/SKILL.md missing 'description' field"
            fi

            echo "  $skill_name: PASSED"
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "FAILED: $errors error(s) found"
            exit 1
          fi

          echo ""
          echo "All skills validated successfully."

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check markdown files exist and are non-empty
        run: |
          echo "Checking markdown files..."
          find . -name '*.md' -not -path './.git/*' | while read -r f; do
            if [ ! -s "$f" ]; then
              echo "WARNING: $f is empty"
            else
              lines=$(wc -l < "$f")
              echo "  $f: ${lines} lines"
            fi
          done
          echo "Markdown check complete."
